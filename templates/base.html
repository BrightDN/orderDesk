{{ define "base" }}
<!DOCTYPE html>
<html>
<head>
  <title>{{ block "title" . }}Default{{ end }}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/assets/stylesheets/houserules.css">
  <link rel="stylesheet" href="/assets/stylesheets/topbar.css">
  <link rel="stylesheet" href="/assets/stylesheets/nav.css">


  <script defer src="/assets/scripts/nav.js"></script>
  {{ block "stylesheets" . }}{{end}}
  {{ block "scripts" . }}{{end}}
</head>
<body>
  <div class="app">
    {{ template "navbar" . }}
    
    <main>
      {{ template "topbar" . }}
      <div class="content">
        {{ block "content" . }}{{ end }}
      </div>
    </main>
      
    <!-- {{ template "footer" . }} -->
  </div>
</body>
</html>
{{ end }}
