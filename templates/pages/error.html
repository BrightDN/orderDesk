{{ define "error" }}
    {{ template "centerBase" . }}
{{ end }}


{{ define "title" }}OD - error{{ end }}

{{ define "content" }}
  <header class="logo-spaced">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 13V7m0 0L8 3l5 4m-5-4v10m5-6v6M1 13h14"/>
      </svg>
    </div>
      <p class="logo-text">{{ .identity.AppName}}</p>
  </header>

  <p class="error-code">{{ .Code }}</p>
  <h1 class="error-title">{{ if le .Code 500 }}Page not found{{ else}}Something went wrong{{end}}</h1>
  <p class="error-message">{{ .Message }}</p>

  <div class="error-actions">
    <button class="btn-primary" onclick="history.back()">
      <svg viewBox="0 0 14 14"><path d="M9 2L3 7l6 5"/></svg>
      Go back
    </button>
    <hr class="vertical-divider">
    <a href="/support/contact" class="btn">
      Contact
    </a>
  </div>
  {{ end }}
