{{ define "centerBase" }}
<!DOCTYPE html>
<html lang="en" hx-headers='{"X-CSRF-TOKEN": {{ $.csrf }} }'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
  <link rel="manifest" href="/assets/images/favicon/site.webmanifest">

    <link rel="stylesheet" href="/assets/stylesheets/houserules.css">
    <link rel="stylesheet" href="/assets/stylesheets/centerPages.css">
    {{ block "stylesheets" . }}{{end}}
    {{ block "scripts" . }}{{end}}
    <script defer src="/assets/scripts/feedback.js"></script>
    <script defer src="/assets/scripts/htmx.min.js"></script>
    
    <title>{{ block "title" . }}OD{{ end }}</title>
</head>
<body>
    {{ template "feedback" . }}
    <main class="centralize">
        {{block "content" . }} {{ end }}
    </main>
</body>
</html>
{{ end }}
