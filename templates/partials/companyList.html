{{ define "companyList" }}
{{ if .isPartial }}{{ template "feedback" . }}{{ end }}
<div id="company-list">
  <p class="section-label">Companies</p>
  <div class="module">
    <table class="co-table">
      <thead>
        <tr>
          <th>Company</th>
          <th>Created</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {{ range .companies }}
        <tr>
          <td data-label="Company">
            <p class="co-name">{{ .Name }}</p>
            <p class="co-email">{{ .Email }}</p>
          </td>
          <td data-label="Created">
            <span class="co-date">{{ .CreatedAt }}</span>
          </td>
          <td data-label="Status">
            <span class="badge badge-{{ if .IsDeleted }}red{{ else }}green{{ end }}">{{ if .IsDeleted }}Inactive{{ else }}Active{{ end }}</span>
          </td>
          <td data-label="Actions">
            <div class="invite-actions">

              <button 
                type="button"
                class="btn-primary btn-xs"
                onclick="window.location.href = '/admin/companies/details/{{.ID}}';">
              Details

            </div>
          </td>
        </tr>
        {{ end }}
      </tbody>
    </table>
  </div>
</div>
{{ end }}
