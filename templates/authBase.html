{{ define "authBase" }}

<!DOCTYPE html>
<html>
<head>
  <title>{{ block "title" . }}OD{{ end }}</title>
  
  <link rel="stylesheet" href="/assets/stylesheets/houserules.css">
  <link rel="stylesheet" href="/assets/stylesheets/auth.css">

  {{ block "stylesheets" . }}{{end}}
  {{ block "scripts" . }}{{end}}

</head>
<body>
<main class="od-wrap">
  <section class="od-card" aria-labelledby="login-heading">
    <header class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 13V7m0 0L8 3l5 4m-5-4v10m5-6v6M1 13h14"/>
        </svg>
      </div>
      <div>
        <p class="logo-text">OrderDesk</p>
        <p class="logo-sub">Markt Storeroom</p>
      </div>
    </header>

    <h1 class="od-heading" id="login-heading">Welcome back</h1>
    <p class="od-sub">Sign in to your workspace</p>

    <p class="od-error" id="od-err">Invalid email or password. Please try again.</p>

    <div class="field od-field">
      <label for="od-email">Email</label>
      <input id="od-email" type="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field od-field">
      <label for="od-pass">Password</label>
      <input id="od-pass" type="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="btn-primary od-btn" id="od-submit">
      <svg viewBox="0 0 14 14"><path d="M2 7h10M7 2l5 5-5 5"/></svg>
      Sign in
    </button>

    <hr class="od-divider">
    <p class="od-footer">Contact your administrator to create an account</p>
  </section>
</main>

<script>
  document.getElementById('od-submit').addEventListener('click', () => {
    const email = document.getElementById('od-email').value;
    const pass = document.getElementById('od-pass').value;
    const err = document.getElementById('od-err');
    if (!email || !pass) {
      err.textContent = !email ? 'Email is required.' : 'Password is required.';
      err.classList.add('show');
    } else {
      err.classList.remove('show');
    }
  });
  document.querySelectorAll('.od-input').forEach(i => {
    i.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('od-submit').click();
    });
  });
</script>

</body>
</html>
{{ end }}
