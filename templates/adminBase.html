{{ define "adminBase" }}
<!DOCTYPE html>
<html>

  <link rel="stylesheet" href="/assets/stylesheets/topbar.css">
  <link rel="stylesheet" href="/assets/stylesheets/nav.css">

  {{ block "stylesheets" . }}{{end}}
  {{ block "scripts" . }}{{end}}

</head>
<body>
  <div class="app">
    {{ template "navbar" . }}
    
    <main>
      {{ template "topbar" . }}
      <div class="content">

    </main>
      
    <!-- {{ template "footer" . }} -->

  {{ block "modals" . }}{{end}}
</body>
</html>
