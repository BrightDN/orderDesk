{{ define "navbar" }}

  <aside class="sidebar">
    <header class="logo">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 13V7m0 0L8 3l5 4m-5-4v10m5-6v6M1 13h14"/>
          </svg>
        </div>
        
        <div>
          <p class="logo-text">OrderDesk</p>
          <p class="logo-sub">{{ "storename" }}</p>
        </div>

      </div>
    </header>

    <nav class="nav-section" aria-label="Main menu">
      <p class="nav-label">Menu</p>
      <a href="/dashboard/suppliers" class='nav-item {{ if eq .Page "suppliers" }} active {{end }}'>
        <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Suppliers
      </a>
      <a href="/dashboard/neworder" class='nav-item {{ if eq .Page "new order" }} active {{end }}'>
        <svg viewBox="0 0 16 16"><path d="M2 4h12M4 4V3a1 1 0 011-1h6a1 1 0 011 1v1m2 0l-1 9a1 1 0 01-1 1H4a1 1 0 01-1-1L2 4"/></svg>
        New order
      </a>
      <a href="/dashboard/history" class='nav-item {{ if eq .Page "history" }} active {{end }}'>
        <svg viewBox="0 0 16 16"><path d="M2 3h12v2H2zm0 4h12v2H2zm0 4h7v2H2z"/></svg>
        Order history
      </a>
    </nav>

    <nav class="nav-section nav-section-spaced" aria-label="Admin menu">
      <p class="nav-label">Admin</p>
      <a href="/dashboard/settings" class='nav-item {{ if eq .Page "company settings" }} active {{end }}'>
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        Settings
      </a>
    </nav>

    <div class="nav-bottom">
      <div class="nav-user">
        <div>
          <p class="user-name">Jan V.</p>
          <p class="user-role">Employee</p>
        </div>
      </div>
      <button class="btn" popovertarget="settings-pop">⚙</button>
      <div id="settings-pop" popover>
        <a href="/settings/user">User settings</a>
        <a href="/settings/company">Switch company</a>
        <a href="/support/contact">Contact</a>
        <a href="/auth/logout">Logout</a>
      </div>
    </div>
  </aside>

{{ end }}
