{{ define "historyTable"}}
<p class="section-label">Order history — FreshVeg BV</p>

<div class="module">
  <table class="history-table">
    <thead>
      <tr>
        <th>Reference</th>
        <th>Date</th>
        <th>Items</th>
        <th>Placed by</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="history-body">
      <tr>
        <td><span class="order-ref">#ORD-0041</span></td>
        <td><time class="order-date" datetime="2026-04-29T14:32">29 Apr 2026</time><p class="order-date-sub">14:32</p></td>
        <td><span class="order-items">14 items</span></td>
        <td><span class="order-by">Jan V.</span></td>
        <td><button class="btn-dl" title="Download PDF"><svg viewBox="0 0 14 14"><path d="M7 2v7M4 6l3 3 3-3M2 11h10"/></svg></button></td>
      </tr>
      <tr>
        <td><span class="order-ref">#ORD-0038</span></td>
        <td><time class="order-date" datetime="2026-04-26T09:15">26 Apr 2026</time><p class="order-date-sub">09:15</p></td>
        <td><span class="order-items">11 items</span></td>
        <td><span class="order-by">Jan V.</span></td>
        <td><button class="btn-dl" title="Download PDF"><svg viewBox="0 0 14 14"><path d="M7 2v7M4 6l3 3 3-3M2 11h10"/></svg></button></td>
      </tr>
      <tr>
        <td><span class="order-ref">#ORD-0035</span></td>
        <td><time class="order-date" datetime="2026-04-23T11:47">23 Apr 2026</time><p class="order-date-sub">11:47</p></td>
        <td><span class="order-items">16 items</span></td>
        <td><span class="order-by">Jan V.</span></td>
        <td><button class="btn-dl" title="Download PDF"><svg viewBox="0 0 14 14"><path d="M7 2v7M4 6l3 3 3-3M2 11h10"/></svg></button></td>
      </tr>
    </tbody>
  </table>
</div>

<script>
const data = {
  freshveg: [
    {ref:'#ORD-0041', date:'29 Apr 2026', time:'14:32', items:14, by:'Jan V.'},
    {ref:'#ORD-0038', date:'26 Apr 2026', time:'09:15', items:11, by:'Jan V.'},
    {ref:'#ORD-0035', date:'23 Apr 2026', time:'11:47', items:16, by:'Jan V.'},
  ],
  dairygo: [
    {ref:'#ORD-0040', date:'28 Apr 2026', time:'10:00', items:6, by:'Jan V.'},
  ],
  bakker: [],
  grocer: [
    {ref:'#ORD-0039', date:'27 Apr 2026', time:'13:20', items:9, by:'Jan V.'},
    {ref:'#ORD-0036', date:'24 Apr 2026', time:'08:55', items:12, by:'Jan V.'},
  ],
};

const names = {freshveg:'FreshVeg BV', dairygo:'DairyGo', bakker:'BakkerKoning', grocer:'GrocerMart'};

function selectSupplier(card, key) {
  document.querySelectorAll('.supplier-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const body = document.getElementById('history-body');
  const label = document.querySelector('.section-label:last-of-type');
  label.textContent = `Order history — ${names[key]}`;
  const orders = data[key];
  if (!orders.length) {
    body.innerHTML = `<tr><td colspan="5"><p class="empty">No orders found for this supplier</p></td></tr>`;
    return;
  }
  body.innerHTML = orders.map(o => `
    <tr>
      <td><span class="order-ref">${o.ref}</span></td>
      <td><time class="order-date">${o.date}</time><p class="order-date-sub">${o.time}</p></td>
      <td><span class="order-items">${o.items} items</span></td>
      <td><span class="order-by">${o.by}</span></td>
      <td><button class="btn-dl" title="Download PDF"><svg viewBox="0 0 14 14"><path d="M7 2v7M4 6l3 3 3-3M2 11h10"/></svg></button></td>
    </tr>
  `).join('');
}
</script>
{{ end }}
