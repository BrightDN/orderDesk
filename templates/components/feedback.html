{{ define "feedback" }}
  {{ with .feedback }}
    <aside class="feedback-banner feedback-{{ .Type }}" role="status" aria-live="polite" data-feedback-banner>
      <p>{{ .Message }}</p>
      <button class="feedback-close" type="button" aria-label="Close message" data-feedback-close>
        <svg viewBox="0 0 14 14" aria-hidden="true">
          <path d="M3 3l8 8M11 3l-8 8"/>
        </svg>
      </button>
    </aside>
  {{ end }}
{{ end }}
