{{ define "supplierList" }}
      <div class="section-label">Suppliers — 4 total</div>

      <div class="supplier-grid">
        <div class="supplier-card selected">
          <div class="s-header">
            <div>
              <div class="s-name">FreshVeg BV</div>
              <div class="s-cat">Produce</div>
            </div>
          </div>
          <div class="s-meta">
            <div class="s-count">14 products</div>
            {{ if eq .Page "suppliers"}}
            <span class="badge-green">Active</span>
            {{ end }}
          </div>
        </div>

        <div class="supplier-card">
          <div class="s-header">

            <div>
              <div class="s-name">DairyGo</div>
              <div class="s-cat">Dairy &amp; eggs</div>
            </div>
          </div>

            <div class="s-count">8 products</div>
            {{ if eq .Page "suppliers"}}
            <span class="badge-green">Active</span>
            {{ end }}
          </div>
        </div>

        <div class="supplier-card">
          <div class="s-header">
            <div>
              <div class="s-name">BakkerKoning</div>
              <div class="s-cat">Bakery</div>
            </div>
          </div>
          <div class="s-meta">
            <div class="s-count">6 products</div>
            {{ if eq .Page "suppliers"}}

            {{ end }}
          </div>
        </div>
      </div>
{{ end }}
