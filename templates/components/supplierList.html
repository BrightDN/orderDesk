{{ define "supplierList" }}
      <p class="section-label">Suppliers &mdash; {{ len .Suppliers }} total</p>

      <div class="supplier-grid">
      {{ range $index, $supplier := .Suppliers }}
       <article class="supplier-card{{ if eq $index 0 }} selected{{ end }}">
          <div class="s-header">
              <h2 class="s-name">{{ $supplier.Name }}</h2>
              <p class="s-cat">{{ $supplier.Email }}</p>
          </div>
          <div class="s-meta">
            <p class="s-count">{{ $supplier.Count }} products</p>
            {{ if $supplier.Active }}
            <span class="badge badge-green">Active</span>
            {{ else }}
            <span class="badge badge-red">Inactive</span>
            {{ end }}
          </div>
       </article>
      {{ end }}
      </div>
{{ end }}
